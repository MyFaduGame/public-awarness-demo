<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - HDFC Bank</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #004c8c 0%, #0066b2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 50px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }

        .error-icon {
            font-size: 6em;
            margin-bottom: 20px;
        }

        h1 {
            color: #004c8c;
            margin-bottom: 15px;
            font-size: 2.5em;
        }

        .message {
            color: #666;
            font-size: 1.2em;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .error-details {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            border-left: 4px solid #dc3545;
        }

        .error-details p {
            color: #721c24;
            font-weight: 500;
        }

        .home-btn {
            background: linear-gradient(135deg, #004c8c 0%, #0066b2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .home-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 76, 140, 0.4);
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-icon">❌</div>
        <h1>Oops! Something Went Wrong</h1>
        <p class="message">
            We encountered an issue with your request.
        </p>

        <div class="error-details">
            <p>{{ message }}</p>
        </div>

        <p style="color: #999; margin-bottom: 30px;">
            This could happen if:
            <br>• The session has expired
            <br>• The data has been deleted (after 1 hour)
            <br>• The link is invalid
        </p>

        <a href="/" class="home-btn">🏠 Return to Home</a>
    </div>
</body>
</html>
